# RBAC for per-user secret isolation.
#
# Each NanoClaw pod runs under a ServiceAccount named nc-sa-{user_hash}.
# A Role + RoleBinding scoped to resourceNames ensures each SA can only
# read its own Secret (nc-secret-{user_hash}).
#
# The orchestrator ServiceAccount needs broader secret access to create/
# update/delete user secrets. That is granted separately below.

---
# Orchestrator ServiceAccount — manages all nc-secret-* secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harry-botter-orchestrator
  namespace: nanoclaw

---
# Role: orchestrator can CRUD all nc-secret-* secrets in the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-secret-manager
  namespace: nanoclaw
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch", "delete", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-secret-manager-binding
  namespace: nanoclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: orchestrator-secret-manager
subjects:
  - kind: ServiceAccount
    name: harry-botter-orchestrator
    namespace: nanoclaw

---
# Template: Per-user ServiceAccount, Role, and RoleBinding.
# The orchestrator creates these dynamically for each user.
# Below is an example for user_hash "XXXXXXXX" — replace at creation time.
#
# apiVersion: v1
# kind: ServiceAccount
# metadata:
#   name: nc-sa-XXXXXXXX
#   namespace: nanoclaw
#
# ---
# apiVersion: rbac.authorization.k8s.io/v1
# kind: Role
# metadata:
#   name: nc-secret-reader-XXXXXXXX
#   namespace: nanoclaw
# rules:
#   - apiGroups: [""]
#     resources: ["secrets"]
#     resourceNames: ["nc-secret-XXXXXXXX"]
#     verbs: ["get"]
#
# ---
