#   namespace: nanoclaw
# roleRef:
#   apiGroup: rbac.authorization.k8s.io
#   kind: Role
#   name: nc-secret-reader-XXXXXXXX
# subjects:
#   - kind: ServiceAccount
#     name: nc-sa-XXXXXXXX
#     namespace: nanoclaw
